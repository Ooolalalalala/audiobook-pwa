<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Аудиокниги PWA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player-panel">
    <div class="player-container">
      <div class="now-playing">
        <img id="player-cover" src="icon-192.png" alt="Обложка" class="player-cover-img">
        <div class="track-info">
          <h3 id="current-title">Выберите книгу</h3>
          <p id="current-track-name">Трек не выбран</p>
        </div>
      </div>
      
      <audio id="main-audio" preload="metadata"></audio>
      
      <div class="controls-row">
        <button id="btn-skip-back" class="btn-skip">-10с</button>
        <button id="btn-play-pause" class="btn-main-play">▶</button>
        <button id="btn-skip-forward" class="btn-skip">+10с</button>
      </div>

      <div class="timeline-row">
        <span id="time-current">0:00</span>
        <input type="range" id="player-progress" value="0" min="0" max="100">
        <span id="time-total">0:00</span>
      </div>

      <div class="meta-row">
        <div class="speed-control">
          <label for="select-speed">Скорость:</label>
          <select id="select-speed">
            <option value="1.0" selected>1.0x</option>
            <option value="1.2">1.2x</option>
            <option value="1.5">1.5x</option>
            <option value="1.75">1.75x</option>
            <option value="2.0">2.0x</option>
          </select>
        </div>
        <div id="sync-status" class="status-badge">Синхронизация...</div>
      </div>
    </div>
  </div>

  <div class="content-area">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Поиск книги по названию...">
    </div>

    <div id="loading-overlay">Загрузка библиотеки...</div>
    <div id="library-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
